version: '3.8'

services:
  influxdb:
    image: influxdb:2.7
    container_name: capstone_influxdb
    ports:
      - "8086:8086"
    restart: always

  mysql-node-1:
    image: mysql:8.0
    container_name: capstone_mysql_1
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    restart: always

  mysql-node-2:
    image: mysql:8.0
    container_name: capstone_mysql_2
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    restart: always
